<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottawa Active: Sports Map</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="map"></div>

    <div class="sidebar">
        <div class="header">
            <h1>Ottawa Active</h1>
            <p>Explore city sports facilities</p>
        </div>

        <div class="status-container" id="status-container">
            <div class="loader"></div>
            <span id="status-text">Connecting to Live Data...</span>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search (e.g. 'gym', 'bars', 'court')...">
        </div>

        <div class="type-filters">
            <button class="type-btn active" data-env="all">All</button>
            <button class="type-btn" data-env="indoor">Indoor</button>
            <button class="type-btn" data-env="outdoor">Outdoor</button>
        </div>

        <div class="filters">
            <!-- Tennis Toggle -->
            <label class="filter-group">
                <div class="filter-label">
                    <div class="icon-box icon-tennis">
                        <i class="fa-solid fa-table-tennis-paddle-ball"></i>
                    </div>
                    <span>Tennis Courts</span>
                </div>
                <div class="switch">
                    <input type="checkbox" id="toggle-tennis" checked>
                    <span class="slider"></span>
                </div>
            </label>

            <!-- Basketball Toggle -->
            <label class="filter-group">
                <div class="filter-label">
                    <div class="icon-box icon-basketball">
                        <i class="fa-solid fa-basketball"></i>
                    </div>
                    <span>Basketball Courts</span>
                </div>
                <div class="switch">
                    <input type="checkbox" id="toggle-basketball" checked>
                    <span class="slider"></span>
                </div>
            </label>

            <!-- Skating Rink Toggle -->
            <label class="filter-group">
                <div class="filter-label">
                    <div class="icon-box icon-rink">
                        <i class="fa-solid fa-snowflake"></i>
                    </div>
                    <span>Skating Rinks</span>
                </div>
                <div class="switch">
                    <input type="checkbox" id="toggle-rink" checked>
                    <span class="slider"></span>
                </div>
            </label>

            <!-- Outdoor Gym Toggle -->
            <label class="filter-group">
                <div class="filter-label">
                    <div class="icon-box icon-gym">
                        <i class="fa-solid fa-dumbbell"></i>
                    </div>
                    <span>Outdoor Gyms</span>
                </div>
                <div class="switch">
                    <input type="checkbox" id="toggle-gym" checked>
                    <span class="slider"></span>
                </div>
            </label>
        </div>

        <button id="reset-view-btn" class="reset-btn" style="display: none;" onclick="resetView()">
            <i class="fa-solid fa-earth-americas"></i> View Entire Ottawa
        </button>

        <div class="stats">
            <div class="stat-box stat-tennis-box">
                <span class="stat-value" id="stat-tennis">0</span>
                <span class="stat-label">Tennis</span>
            </div>
            <div class="stat-box stat-basketball-box">
                <span class="stat-value" id="stat-basketball">0</span>
                <span class="stat-label">Basketball</span>
            </div>
            <div class="stat-box stat-rink-box">
                <span class="stat-value" id="stat-rink">0</span>
                <span class="stat-label">Rinks</span>
            </div>
            <div class="stat-box stat-gym-box">
                <span class="stat-value" id="stat-gym">0</span>
                <span class="stat-label">Gyms</span>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <!-- Data & Custom JS -->
    <script src="data/outdoor_gyms.js"></script>
    <script src="app.js"></script>
</body>

</html>
